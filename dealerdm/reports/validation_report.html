<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Migration Validation Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans','Segoe UI',system-ui,sans-serif;background:#f9fafb;color:#111827;min-height:100vh}

/* ── Cards & Surfaces ── */
.glass{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-card{background:#ffffff;border:1px solid #e5e7eb;border-radius:10px;padding:20px 16px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03);transition:box-shadow .15s,border-color .15s}
.stat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:#d1d5db}
.stat-card .num{font-size:1.75rem;font-weight:800;line-height:1.1;color:#ea580c!important}
.stat-card .lbl{font-size:11px;color:#6b7280;margin-top:6px;text-transform:uppercase;letter-spacing:.03em;font-weight:600}

/* ── Score Ring ── */
.score-ring{width:140px;height:140px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .value{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#111827}

/* ── Sections ── */
.section{margin-bottom:28px}
.section h3{font-size:14px;font-weight:700;color:#111827!important;margin-bottom:12px;display:flex;align-items:center;gap:8px;letter-spacing:-.01em}

/* ── Tables ── */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.tbl th{text-align:left;padding:10px 14px;color:#6b7280;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e5e7eb;background:#f9fafb;position:sticky;top:0;z-index:1}
.tbl td{padding:10px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle;color:#374151!important}
.tbl tbody tr{transition:background .1s}
.tbl tr:hover td{background:#fef7f2!important}
.tbl tr:nth-child(even) td{background:#fafafa}
.tbl tr:nth-child(even):hover td{background:#fef7f2!important}

/* ── Badges — professional semantic colors ── */
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:.02em}
.badge-exact{background:#ecfdf5;color:#059669;border:1px solid #d1fae5}
.badge-approximate{background:#eff6ff;color:#2563eb;border:1px solid #dbeafe}
.badge-partial{background:#fffbeb;color:#d97706;border:1px solid #fef3c7}
.badge-incorrect{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.badge-unknown{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.badge-matched{background:#ecfdf5;color:#059669;border:1px solid #d1fae5}
.badge-missing{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.badge-extra{background:#eff6ff;color:#2563eb;border:1px solid #dbeafe}

/* ── Tabs ── */
.tab-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid transparent;background:transparent;color:#6b7280;cursor:pointer;transition:all .15s}
.tab-btn.active{background:rgba(234,88,12,.07);color:#ea580c;border-color:rgba(234,88,12,.18);box-shadow:0 1px 2px rgba(234,88,12,.06)}
.tab-btn:hover:not(.active){color:#374151;background:#f3f4f6}
.view-panel{display:none}
.view-panel.active{display:block}

/* ── Risk Pills ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em}
.risk-low{background:#ecfdf5;color:#059669;border:1px solid #d1fae5}
.risk-medium{background:#fffbeb;color:#d97706;border:1px solid #fef3c7}
.risk-high{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

/* ── Progress Bars ── */
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s}

/* ── Data Comparison ── */
.dc-sidebar{width:260px;min-width:260px;background:#ffffff;border:1px solid #e5e7eb;border-radius:10px;overflow-y:auto;max-height:calc(100vh - 200px);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dc-dash-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f3f4f6;transition:all .12s;font-size:12px;font-weight:600;color:#6b7280}
.dc-dash-item:hover{background:#fef7f2;color:#374151}
.dc-dash-item.active{background:rgba(234,88,12,.05);color:#ea580c;border-left:3px solid #ea580c}
.dc-ws-pill{display:inline-block;padding:5px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;color:#6b7280;background:transparent;transition:all .12s;margin:2px}
.dc-ws-pill.active{background:rgba(234,88,12,.07);color:#ea580c;border-color:rgba(234,88,12,.18)}
.dc-ws-pill:hover:not(.active){color:#374151;background:#f9fafb}
.dc-split{display:flex;gap:16px}
.dc-half{flex:1;min-width:0}
.dc-half-header{font-size:12px;font-weight:700;padding:10px 14px;border-radius:10px 10px 0 0;text-align:center;text-transform:uppercase;letter-spacing:.04em}
.dc-tbl-wrap{overflow:auto;max-height:500px;border:1px solid #e5e7eb;border-radius:0 0 10px 10px;background:#ffffff}
.dc-stat{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;margin-right:14px}
.dc-stat b{color:#374151;font-size:13px}
.dc-match{color:#059669}.dc-mismatch{color:#dc2626}

/* ══ Inline-style overrides (override JS-generated colors) ══ */

/* Force headings dark */
h1,h2,h3,h4,.text-white{color:#111827!important}
.text-slate-500{color:#6b7280!important}

/* Override rainbow stat-card numbers to primary orange */
.stat-card .num{color:#ea580c!important}

/* ── Override inline dark-theme text colors (these are set by JS) ── */
[style*="color:#cbd5e1"]{color:#374151!important}
[style*="color:#94a3b8"]{color:#4b5563!important}
[style*="color:#e2e8f0"]{color:#111827!important}
[style*="color:#64748b"]{color:#6b7280!important}
h3[style*="color:#fff"]{color:#111827!important}
p[style*="color:#fff"]{color:#111827!important}
div.glass h3[style*="color:#fff"]{color:#111827!important}

/* ── Override rainbow accent colors in JS to unified orange ── */
[style*="color:#e879f9"]{color:#ea580c!important}
[style*="color:#22d3ee"]{color:#ea580c!important}
[style*="color:#818cf8"]{color:#ea580c!important}
[style*="color:#a78bfa"]{color:#ea580c!important}
[style*="color:#6366f1"]{color:#ea580c!important}
[style*="color:#f59e0b"]{color:#ea580c!important}

/* ── Semantic heading colors (keep meaningful, but use darker tones) ── */
h3[style*="color:#10b981"]{color:#059669!important}
h3[style*="color:#f87171"]{color:#dc2626!important}
h3[style*="color:#60a5fa"]{color:#2563eb!important}

/* ── Table cell text always dark ── */
.tbl td{color:#374151!important}
.tbl td .badge{color:inherit!important}

/* ── Progress bars: unified orange ── */
.progress-fill{background:#ea580c!important}

/* ── Badges with dark BG from JS → light BG ── */
.badge[style*="background:rgba(0,0,0"]{background:#f3f4f6!important;border:1px solid #e5e7eb!important}

/* ── Override dark ring track ── */
svg circle[stroke="#1e2040"]{stroke:#e5e7eb!important}

/* ── Data comparison half-headers: consistent neutral ── */
.dc-half-header{background:#f9fafb!important;color:#374151!important;border:1px solid #e5e7eb;border-bottom:none}

/* ── Header area ── */
.report-header{border-bottom:1px solid #e5e7eb;padding-bottom:20px;margin-bottom:24px}
.report-meta{display:flex;align-items:center;gap:6px;color:#9ca3af;font-size:12px;margin-top:4px}
.report-meta svg{width:14px;height:14px;stroke:#9ca3af}
</style>
</head>

    var pbiRows=pbi.total_row_count||pbi.row_count||0;
    var twbRows=twb.total_row_count||twb.row_count||0;
    var pbiCols=pbi.col_count||0;
    var twbCols=twb.col_count||0;
    h+='<div style="margin-bottom:10px;padding:4px 0">';
    h+='<span class="dc-stat">PBI: <b>'+pbiRows+'</b> rows &times; <b>'+pbiCols+'</b> cols</span>';
    h+='<span class="dc-stat">TWB: <b>'+twbRows+'</b> rows &times; <b>'+twbCols+'</b> cols</span>';
    var rowMatch=pbiRows===twbRows;
    var colMatch=pbiCols===twbCols;
    h+='<span class="dc-stat">Rows: <b class="'+(rowMatch?'dc-match':'dc-mismatch')+'">'+(rowMatch?'&#10003; Match':'&#10007; Differ')+'</b></span>';
    h+='<span class="dc-stat">Cols: <b class="'+(colMatch?'dc-match':'dc-mismatch')+'">'+(colMatch?'&#10003; Match':'&#10007; Differ')+'</b></span>';
    h+='</div>';

    /* validation score card for this worksheet */
    var wsKey=(dash.name||'')+'||'+(ws.name||'');
    var wsScore=(window._wsScoreMap||{})[wsKey];
    if(wsScore){
      var oc=scoreColor(wsScore.overall_worksheet_score||0);
      h+='<div class="glass" style="padding:14px 18px;margin-bottom:14px">';
      h+='<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">';
      h+='<div style="font-size:13px;font-weight:700;color:#e879f9">&#9733; Data Validation</div>';
      h+='<span class="badge" style="background:rgba(0,0,0,.2);color:'+scoreColor(wsScore.column_accuracy_score||0)+';font-size:11px;padding:3px 10px">Column Accuracy: '+(wsScore.column_accuracy_score||0)+'</span>';
      h+='<span class="badge" style="background:rgba(0,0,0,.2);color:'+scoreColor(wsScore.row_accuracy_score||0)+';font-size:11px;padding:3px 10px">Row Accuracy: '+(wsScore.row_accuracy_score||0)+'</span>';
      h+='<span class="badge" style="background:rgba(0,0,0,.2);color:'+scoreColor(wsScore.data_accuracy_score||0)+';font-size:11px;padding:3px 10px">Data Accuracy: '+(wsScore.data_accuracy_score||0)+'</span>';
      h+='<span class="badge" style="background:rgba(0,0,0,.3);color:'+oc+';font-size:13px;padding:4px 14px;font-weight:800">Overall: '+(wsScore.overall_worksheet_score||0)+'</span>';
      h+='</div>';
      if(wsScore.notes){h+='<p style="font-size:12px;color:#94a3b8;margin-top:8px;line-height:1.5">'+wsScore.notes+'</p>';}
      /* data issues list */
      var di=wsScore.data_issues||[];
      if(di.length){h+='<div style="margin-top:8px"><div style="font-size:11px;color:#f87171;font-weight:600;margin-bottom:4px">Data Issues:</div><ul style="list-style:none;padding:0">';di.forEach(function(issue){h+='<li style="font-size:11px;color:#fbbf24;padding:2px 0">&#9888; '+issue+'</li>';});h+='</ul></div>';}
      /* header mapping */
      var hm=wsScore.header_mapping||[];
      if(hm.length){h+='<div style="margin-top:8px"><div style="font-size:11px;color:#818cf8;font-weight:600;margin-bottom:4px">Header Mapping:</div><div style="display:flex;flex-wrap:wrap;gap:4px">';hm.forEach(function(m){var mclr=m.match_quality==='exact'?'#34d399':m.match_quality==='renamed'?'#60a5fa':m.match_quality==='missing'?'#f87171':'#64748b';h+='<span class="badge" style="background:rgba(0,0,0,.2);color:'+mclr+';font-size:10px">'+(m.pbi||m.twb||'?')+' → '+(m.twb||m.pbi||'?')+' ('+m.match_quality+')</span>';});h+='</div></div>';}
      h+='</div>';
    }

    /* side-by-side tables */
    h+='<div class="dc-split">';

    /* PBI side */
    h+='<div class="dc-half">';
    h+='<div class="dc-half-header" style="background:rgba(99,102,241,.15);color:#818cf8">Power BI Data</div>';
    h+='<div class="dc-tbl-wrap">'+_dcBuildTable(pbi,'PBI','#818cf8')+'</div>';
    h+='</div>';

    /* TWB side */
    h+='<div class="dc-half">';
    h+='<div class="dc-half-header" style="background:rgba(245,158,11,.15);color:#f59e0b">Tableau (TWB) Data</div>';
    h+='<div class="dc-tbl-wrap">'+_dcBuildTable(twb,'TWB','#f59e0b')+'</div>';
    h+='</div>';

    h+='</div>';
  } else {
    h+='<div class="glass" style="padding:20px;text-align:center;color:#64748b">No worksheets in this dashboard.</div>';
  }

  el.innerHTML=h;
}
(function(){
  document.getElementById('metaLine').textContent='Project: '+(V.project_name||'—')+' | Generated: '+(V.timestamp||'—');
  var score=(V.overall_assessment||{}).overall_score;
  if(score==null){var sc=V.schema_validation||{},ms=V.measures_validation||{},dv=V.data_validation||{};var dvs=dv.data_validation_score||0;if(dvs>0){score=Math.round((sc.schema_score||0)*0.25+(ms.structural_score||0)*0.45+dvs*0.30);}else{score=Math.round(((sc.schema_score||0)*0.40+(ms.structural_score||0)*0.60));}}
  drawRing('scoreRing',score);
  var risk=(V.overall_assessment||{}).risk_level||'—';var rc=risk.toLowerCase();
  document.getElementById('riskBadge').innerHTML='<div style="text-align:center"><div class="pill risk-'+(rc==='low'?'low':rc==='medium'?'medium':'high')+'">'+risk+' Risk</div><div style="font-size:10px;color:#64748b;margin-top:4px">Migration Risk</div></div>';
  renderOverview();renderSchema();renderMeasures();renderAssessment();renderDataCompare();
  /* draw data validation mini ring */
  var dvEl=document.getElementById('dvScoreRing');if(dvEl){var dvs2=(V.data_validation||{}).data_validation_score||0;var c2=scoreColor(dvs2);var r2=40,circ2=2*Math.PI*r2;dvEl.innerHTML='<svg width="100" height="100"><circle cx="50" cy="50" r="'+r2+'" fill="none" stroke="#1e2040" stroke-width="8"/><circle cx="50" cy="50" r="'+r2+'" fill="none" stroke="'+c2+'" stroke-width="8" stroke-dasharray="'+circ2+'" stroke-dashoffset="'+(circ2*(1-Math.min(dvs2,100)/100))+'" stroke-linecap="round" style="transform:rotate(-90deg);transform-origin:50% 50%"/></svg><div class="value" style="font-size:1.4rem;color:'+c2+'">'+Math.round(dvs2)+'</div>';}
})();
</script>
